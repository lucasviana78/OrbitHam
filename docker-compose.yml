services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orbitham}
      POSTGRES_USER: ${POSTGRES_USER:-orbitham}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orbitham}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orbitham}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./apps/backend
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py seed_demo &&
             gunicorn orbitham.wsgi:application -b 0.0.0.0:8000 --workers 3 --timeout 120"
    expose:
      - "8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-worker:
    build: ./apps/backend
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
    command: celery -A orbitham worker -l info
    depends_on:
      - backend
      - redis
    restart: unless-stopped

  celery-beat:
    build: ./apps/backend
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
    command: celery -A orbitham beat -l info
    depends_on:
      - backend
      - redis
    restart: unless-stopped

  frontend:
    build: ./apps/frontend
    env_file: .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: /api
    expose:
      - "3000"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  pgdata:
