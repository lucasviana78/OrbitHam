[tool.ruff]
line-length = 100
target-version = "py313"
exclude = ["**/migrations/*"]

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B"]
ignore = ["B008"]  # Ninja uses Query(...) as default args

[tool.coverage.run]
omit = [
    "*/migrations/*",
    "*/tests/*",
    "manage.py",
    "orbitham/wsgi.py",
    "orbitham/asgi.py",
]
